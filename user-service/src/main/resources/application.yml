server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/user_db
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # H2 profile for local dev (override with -Dspring.profiles.active=h2)
  h2:
    console:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka-secret@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  jwt:
    secret: ${JWT_SECRET:coupon-platform-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in ms

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

---
# H2 dev profile
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:user_db;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
