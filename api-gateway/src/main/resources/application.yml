server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # User Service routes (public - no auth filter)
        - id: user-service-public
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # User Service routes (protected)
        - id: user-service-protected
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - AuthenticationFilter

        # Coupon Service routes
        - id: coupon-service
          uri: lb://coupon-service
          predicates:
            - Path=/api/coupons/**
          filters:
            - AuthenticationFilter

        # Validation Service routes
        - id: validation-service
          uri: lb://validation-service
          predicates:
            - Path=/api/validate/**
          filters:
            - AuthenticationFilter

        # Analytics Service routes
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
          filters:
            - AuthenticationFilter

  # Rate limiting via Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka-secret@${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  jwt:
    secret: ${JWT_SECRET:coupon-platform-secret-key-must-be-at-least-256-bits-long-for-hs256}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    org.springframework.cloud.gateway: INFO
